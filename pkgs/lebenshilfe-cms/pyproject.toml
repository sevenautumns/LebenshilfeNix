[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lebenshilfe-cms"
version = "1.0.0"
dependencies = [
    "django",
    "psycopg",
    "dj-database-url",
    "django-unfold",
]

[tool.setuptools]
packages = { find = {} }

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "lebenshilfe.django.base"
python_files = ["tests.py", "test_*.py", "*_test.py", "tests_*.py"]
