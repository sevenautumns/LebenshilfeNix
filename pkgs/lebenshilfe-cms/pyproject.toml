[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lebenshilfe-cms"
version = "1.0.0"
dependencies = [
    "django",
    "psycopg",
    "dj-database-url",
    "django-unfold",
    "python-docx",
]

[tool.setuptools]
packages = { find = {} }

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-django",
    "model-bakery",
]

[tool.ty.environment]
python-version = "3.13"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "lebenshilfe.django.base"
python_files = ["tests.py", "test_*.py", "*_test.py", "tests_*.py"]
addopts = "-v -n auto"
